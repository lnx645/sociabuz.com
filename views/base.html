<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no" />
    <title>{% block title %}{% endblock title %}</title>
    <!-- CSRF Token -->
    {% for css in vite("src/main.ts").CSS %}
      <link rel="stylesheet" crossorigin href="{{css}}?v1" />
    {% endfor %}
    <!-- initialize main -->
    <script src="{{vite("src/main.ts").JS}}?v2" type="module"></script>
      {% block head %} {% endblock head %}
  </head>
  <body>
    {% block content %}{% endblock content %} 
      
    {% autoescape on %}
    <script>
      console.log("WELCOME");
    </script>
    {% endautoescape %}
  </body>
</html>
